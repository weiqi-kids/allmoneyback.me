name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目標：preview = github.io 草稿預覽；production = 自訂網域上線'
        type: choice
        options:
          - preview
          - production
        default: preview

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        # postbuild script runs pagefind, then `pnpm verify:c2pa` (E13): the C2PA
        # manifest presence check gates the build — if any AI cover claimed as
        # credentialed (coverC2paVerified:true) lost its manifest, postbuild exits
        # non-zero and this Build step (hence deploy) fails. See package.json.
        # push-to-main → inputs.deploy_target is empty → 'production' (custom domain + CNAME).
        # workflow_dispatch → use the chosen deploy_target (default 'preview' = github.io draft).
        env:
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'production' }}
          # GA4 measurement id (PUBLIC_ prefix → exposed to client). Wired from a repo
          # secret so the GA4 tag emits in production once 站長 sets it. Absent-safe:
          # if the secret is unset the var is empty and Base.astro emits no GA4 tag.
          PUBLIC_GA4_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA4_MEASUREMENT_ID }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
